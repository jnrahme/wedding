name: Deploy Wedding Invitation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch "$GITHUB_REF_NAME" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      - name: Check Node
        run: |
          node --version
          npm --version

      - name: Build static site
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Publish to VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" out/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
